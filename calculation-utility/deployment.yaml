apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculation-utility-deployment
  labels:
    app: calculation-utility
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculation-utility
  template:
    metadata:
      labels:
        app: calculation-utility
    spec:
      containers:
      - name: utility-container
        image: calc-utility:v1
        imagePullPolicy: Never
        stdin: true
        tty: true 
        ports:
        - containerPort: 8080 
---
apiVersion: v1
kind: Service
metadata:
  name: calculation-utility-service
spec:
  type: NodePort
  selector:
    app: calculation-utility
  ports:
    - port: 8080 
      targetPort: 8080 
      nodePort: 30080